spring.application.name=pokedex-api

spring.datasource.url=jdbc:postgresql://localhost:5432/pokedex_db
spring.datasource.username=postgres
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

spring.data.mongodb.uri=mongodb://localhost:27017/pokedex_stats

server.port=8080
server.servlet.context-path=/api

app.jwt.secret=${JWT_SECRET:claveDePruebaParaDesarrolloCambiarLuego1234567890}
app.jwt.expiration-ms=86400000