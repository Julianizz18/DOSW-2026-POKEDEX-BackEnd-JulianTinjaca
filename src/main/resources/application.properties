spring.application.name=pokedex-api

spring.datasource.url=jdbc:postgresql://localhost:5432/pokedex_db
spring.datasource.username=postgres
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

spring.data.mongodb.uri=mongodb://localhost:27017/pokedex_stats

spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:CHANGE_ME}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:CHANGE_ME}
spring.security.oauth2.client.registration.google.scope=email,profile

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

server.port=8080
server.servlet.context-path=/api

app.jwt.secret=${JWT_SECRET:bGv5PgO+CLXL1bPmcxKNBMhGfnj/Y/wj+/rXtRfsvmU=}
app.jwt.expiration-ms=86400000
